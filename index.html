/* =========================
   MAP LOAD
========================= */

map.on('load', () => {

map.addSource('restaurants', { type: 'geojson', data: restaurantData });

/* 🎨 COLOR BY CATEGORY */
map.addLayer({
id: 'restaurant-points',
type: 'circle',
source: 'restaurants',
paint: {
  'circle-radius': 8,
  'circle-color': [
    'match',
    ['get', 'category'],
    'Mexican', '#1d3557',
    'Italian', '#e63946',
    'American', '#f4a261',
    'Japanese/Sushi', '#2a9d8f',
    'Indian', '#9b5de5',
    '#888'
  ],
  'circle-stroke-width': 2,
  'circle-stroke-color': '#ffffff'
}
});

/* =========================
   POPUP (TIKTOK)
========================= */

map.on('click', 'restaurant-points', (e) => {

const props = e.features[0].properties;
const coords = e.features[0].geometry.coordinates.slice();

let videosHTML = '';

props.videos.forEach(video => {
videosHTML += `
<div class="tiktok-card">
  <iframe 
    src="${video.url.replace('/video/', '/embed/')}" 
    width="100%" 
    height="200" 
    frameborder="0"
    allowfullscreen>
  </iframe>
  <div class="tiktok-meta">
    <strong>@${video.author}</strong><br>
    ${video.caption}<br>
    ❤️ ${video.likes}
  </div>
</div>
`;
});

new mapboxgl.Popup()
.setLngLat(coords)
.setHTML(`
<div class="popup-wrapper ${props.layout || 'vertical'}">
  <div class="popup-container">
    <img class="popup-image" src="${props.image}">
    <div class="popup-text">
      <div class="popup-title">${props.title}</div>
      <div class="popup-cuisine">${props.cuisine}</div>
      <div class="popup-location">${props.location || ''}</div>
      ${props.menuLink ? `<a href="${props.menuLink}" target="_blank" class="popup-link">View the Menu</a>` : ''}
      ${videosHTML}
    </div>
  </div>
</div>
`)
.addTo(map);

});

});

/* =========================
   FILTER FUNCTION
========================= */

function setFilter(category, btn) {

  // Apply filter
  if (category === 'all') {
    map.setFilter('restaurant-points', null);
  } else {
    map.setFilter('restaurant-points', ['==', ['get', 'category'], category]);
  }

  /* Active button UI */
document.querySelectorAll('.filter-btn')
.forEach(b => b.classList.remove('active'));

btn.classList.add('active');
}
