map.on('load', () => {

map.addSource('art', { type: 'geojson', data: artData });

/* 🎨 COLOR BY CATEGORY */
map.addLayer({
id: 'art-points',
type: 'circle',
source: 'art',
paint: {
  'circle-radius': [
    'interpolate',
    ['linear'],
    ['zoom'],
    10, 6,
    14, 12,
    18, 18
  ],
  'circle-color': [
    'match',
    ['get', 'category'],
    'musician', '#1d3557',
    'sculpture', '#e63946',
    'painting', '#f4a261',
    'drawing', '#2a9d8f',
    'graffiti', '#9b5de5',
    'photography', '#264653',
    '#888'
  ],
  'circle-stroke-width': 2,
  'circle-stroke-color': '#ffffff'
}
});

/* POPUPS */
map.on('click', 'art-points', (e) => {
const props = e.features[0].properties;
const coords = e.features[0].geometry.coordinates.slice();

new mapboxgl.Popup()
.setLngLat(coords)
.setHTML(`
<div class="popup-wrapper ${props.layout || 'vertical'}">
  <div class="popup-container">
    <img class="popup-image" src="${props.image}">
    <div class="popup-text">
      <div class="popup-name">${props.name}</div>
      <div class="popup-cuisine">${props.cuisine}</div>
      <div class="popup-description">${props.description}</div>
      <div class="popup-location">${props.location || ''}</div>
      ${props.link ? `<a href="${props.link}" target="_blank" class="popup-link">Listen to Song</a>` : ''}
      ${props.menuLink ? `<a href="${props.menuLink}" target="_blank" class="popup-link">View the Menu</a>` : ''}
    </div>
  </div>
</div>
`)
.addTo(map);
});

/* 🔘 FILTER FUNCTION */
function setFilter(category, btn) {

  // Apply filter
  if (category === 'all') {
    map.setFilter('art-points', null);
    map.setFilter('art-glow', null); // if using glow layer
  } else {
    map.setFilter('art-points', ['==', ['get', 'category'], category]);
    map.setFilter('art-glow', ['==', ['get', 'category'], category]);
  }

  // Remove active from all buttons
  const buttons = document.querySelectorAll('.filter-btn');
  buttons.forEach(b => b.classList.remove('active'));

  // Add active to clicked button
  btn.classList.add('active');
}
