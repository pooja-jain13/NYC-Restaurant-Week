<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYC Restaurant Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- FILTER BUTTONS -->
<div class="filter-container">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('Mexican', this)">Mexican</button>
  <button class="filter-btn" onclick="setFilter('Italian', this)">Italian</button>
  <button class="filter-btn" onclick="setFilter('Middle Eastern', this)">Middle Eastern</button>
  <button class="filter-btn" onclick="setFilter('Caribbean', this)">Caribbean</button>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- ✅ MODAL (THIS WAS YOUR BUG BEFORE) -->
<div id="videoModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div id="carousel"></div>
  </div>
</div>

<!-- ✅ JS LOADS LAST -->
<script src="app.js"></script>

</body>
</html>
