<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NYC Restaurant Week Map</title>

<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">

<!-- Mapbox -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- FILTER BUTTONS -->
<div class="filter-container">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('wings', this)">Wings</button>
  <button class="filter-btn" onclick="setFilter('mexican', this)">Mexican</button>
  <button class="filter-btn" onclick="setFilter('comfort', this)">Comfort</button>
</div>

<!-- MAP -->
<div id="map"></div>

<script src="app.js"></script>

</body>
</html>
